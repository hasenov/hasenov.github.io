<header class="header">
  <div class="header__container container">
    <div class="header__inner">
      <a href="index.html" class="header__logo">
        <img src="images/logo.png" alt="alt" class="img-responsive" />
      </a>
      <nav class="header__menu menu">
        <ul class="list-unstyled">
          <li class="is-active"><a href="index.html">Главная</a></li>
          <li><a href="#">Карьера</a></li>
          <li><a href="#">ProBono</a></li>
          <li><a href="#">Франшиза</a></li>
          <li><a href="#">Блог</a></li>
          <li><a href="#">Контакты</a></li>
        </ul>
      </nav>
      <div class="header__lang lang">
        <a href="#" class="lang__inner">
          <img src="images/icons/uk.svg" alt="alt" class="lang__flag img-responsive" />
        </a>
      </div>
      <div class="header__socials-wrap">
        <div class="header__socials">
          <a href="tel:+79630385054" class="header__social social">
            <img src="images/icons/phone.svg" alt="alt" class="social__icon img-responsive" />
          </a>
          <a href="#" class="header__social header__social--tg social">
            <img src="images/icons/tg.svg" alt="alt" class="social__icon img-responsive" />
          </a>
          <a href="#" class="header__social social">
            <img src="images/icons/mail.svg" alt="alt" class="social__icon img-responsive" />
          </a>
        </div>
      </div>
      <button class="header__btn btn btn--primary btn--icon-right" type="button" data-micromodal-trigger="modal-callback">
        Есть вопрос?
        <img src="images/icons/chat.svg" alt="alt" class="btn__icon img-responsive" />
      </button>
      <button class="header__hamburger" type="button">
        <img src="images/icons/hamburger.svg" alt="alt" class="header__hamburger-icon img-responsive" />
      </button>
    </div>
  </div>
</header>

<div class="mobile-header">
  <button class="mobile-header__close" type="button">
    <svg role="img" class="mobile-header__close-icon">
      <use href="images/icons/sprite.svg#close"></use>
    </svg>
  </button>
  <div class="mobile-header__content"></div>
</div>

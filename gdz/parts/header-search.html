<header class="header">
  <div class="header__container container">
    <a href="#" class="header__logo">
      <img src="images/logo.png" srcset="images/logo.png 1x, images/logo-2x.png 2x" alt="alt" class="img-responsive" />
    </a>
    <form class="header__search search">
      <button class="search__btn" type="button">
        <svg role="img" class="search__btn-icon">
          <use href="images/icons/sprite.svg#search" />
        </svg>
      </button>
      <div class="search__group">
        <input type="text" class="search__control" placeholder="Поиск среди тысячи учебников" />
        <button class="search__submit" type="submit">
          <svg role="img" class="search__submit-icon">
            <use href="images/icons/sprite.svg#search" />
          </svg>
        </button>
      </div>
    </form>
    <a href="#" class="header__user-link user-link">
      <div class="user-link__username">Никнейм</div>
      <div class="user-link__avatar avatar is-active">
        <svg role="img" class="avatar__icon">
          <use href="images/icons/sprite.svg#user" />
        </svg>
        <div class="avatar__premium-badge premium-badge">
          <svg role="img" class="premium-badge__icon">
            <use href="images/icons/sprite.svg#crown" />
          </svg>
        </div>
      </div>
    </a>
  </div>
</header>

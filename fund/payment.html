<!-- prettier-ignore -->
<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <title>Главная</title>
  <meta name="description" content="описание" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <meta name="theme-color" content="#307EE6" />

  <link rel="stylesheet" href="css/app.css">
</head>

<body>
  <header class="header">
    <div class="header__sidebar scrollbar-webkit">
      <button class="header__open" type="button">
        <svg role="img" class="header__open-icon">
          <use href="images/icons/sprite.svg#hamburger" />
        </svg>
      </button>
      <button class="header__close" type="button">
        <svg role="img" class="header__close-icon">
          <use href="images/icons/sprite.svg#close" />
        </svg>
      </button>
      <a href="index.html" class="header__logo">
        <img src="images/logo.svg" alt="alt" class="img-responsive" />
      </a>
      <div class="header__slogan">возрождение природы</div>
      <div class="header__actions">
        <a href="#" class="header__help btn btn--accent btn--default">Помочь фонду</a>
        <div class="header__lang-actions lang">
          <button class="lang__btn" type="button">
            <span class="lang__placeholder">RU</span>
            <svg role="img" class="lang__icon">
              <use href="images/icons/sprite.svg#caret-down" />
            </svg>
          </button>
          <div class="lang__dropdown">
            <a href="#" class="lang__item"><span class="lang__item-text">en</span></a>
          </div>
        </div>
      </div>
      <div class="header__socials socials">
        <a href="#" class="socials__social social">
          <svg role="img" class="social__icon">
            <use href="images/icons/sprite.svg#tg-circle" />
          </svg>
        </a>
        <a href="#" class="socials__social social">
          <svg role="img" class="social__icon">
            <use href="images/icons/sprite.svg#ig-circle" />
          </svg>
        </a>
        <a href="#" class="socials__social social">
          <svg role="img" class="social__icon">
            <use href="images/icons/sprite.svg#vk-circle" />
          </svg>
        </a>
      </div>
    </div>
    <div class="header__menu">
      <div class="header__menu-wrapper scrollbar-webkit">
        <div class="header__menu-inner">
          <ul class="header__list list-unstyled">
            <li class="has-child">
              <a href="#">Проекты</a>
              <div class="header__arrow">
                <svg role="img">
                  <use href="images/icons/sprite.svg#caret-down" />
                </svg>
              </div>
              <ul class="header__submenu list-unstyled">
                <li><a href="#">Пункт 1</a></li>
                <li><a href="#">Пункт 2</a></li>
                <li><a href="#">Пункт 3</a></li>
              </ul>
            </li>
            <li><a href="#">О фонде</a></li>
            <li><a href="#">Новости</a></li>
            <li><a href="#">Витрина подарков</a></li>
            <li><a href="#">Помочь природе</a></li>
            <li><a href="#">Центр природоохранных инициатив</a></li>
            <li><a href="#">Контакты</a></li>
          </ul>
          <div class="header__lang lang">
            <button class="lang__btn" type="button">
              <span class="lang__placeholder">RU</span>
              <svg role="img" class="lang__icon">
                <use href="images/icons/sprite.svg#caret-down" />
              </svg>
            </button>
            <div class="lang__dropdown">
              <a href="#" class="lang__item">en</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>


  <div class="wrapper">
    <div class="payment" data-aos="fade-in" data-aos-delay="50" data-aos-duration="1000">
      <div class="payment__container container">
        <div class="payment__title">
          Сумма вашего пожертвования: <span class="payment__amount">100.00 руб</span>
          <img src="images/icons/heart.svg" alt="alt" class="payment__icon img-responsive" />
        </div>
        <div class="payment__cards">
          <div class="payment__card payment__card--front card-payment card-payment--front">
            <div class="card-payment__section">
              <label for="number" class="card-payment__label">Номер карты</label>
              <input type="text" class="card-payment__input js-card-mask" placeholder="0000 0000 0000 0000" id="number" />
            </div>
            <div class="card-payment__section card-payment__section--date">
              <label for="date" class="card-payment__label">Срок действоия</label>
              <input type="text" class="card-payment__input" placeholder="00/00" id="date" />
            </div>
          </div>
          <div class="payment__card payment__card--back card-payment card-payment--back">
            <div class="card-payment__section card-payment__section--cvc">
              <label for="cvc" class="card-payment__label">CVV2 / CVC2</label>
              <input type="text" class="card-payment__input" placeholder="Код" id="cvc" />
            </div>
          </div>
        </div>
        <div class="payment__checkboxes">
          <label class="payment__checkbox checkbox">
            <input type="checkbox" class="checkbox__input hidden" />
            <span class="checkbox__box"></span>
            <span class="checkbox__text">Соглашаюсь с <a href="#">офертой</a></span>
          </label>
          <label class="payment__checkbox checkbox">
            <input type="checkbox" class="checkbox__input hidden" />
            <span class="checkbox__box"></span>
            <span class="checkbox__text">Соглашаюсь на обработку моих <a href="#">персональных данных</a></span>
          </label>
        </div>
      </div>
      <img src="images/logo-circle.png" alt="alt" class="payment__logo img-responsive" />
    </div>
  </div>

  <script src="js/app.js"></script>

</body>

</html>

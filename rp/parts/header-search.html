<header class="header">
  <div class="header__container container">
    <a href="index.html" class="header__logo">
      <img src="images/logo.svg" alt="alt" class="img-responsive" />
    </a>
    <form class="header__search search-header js-search-container">
      <button class="search-header__btn" type="button">
        <svg role="img" class="search-header__btn-icon">
          <use href="images/icons/sprite.svg#search" />
        </svg>
      </button>
      <div class="search-header__menu">
        <button class="search-header__close close" type="button">
          <svg role="img" class="close__icon">
            <use href="images/icons/sprite.svg#close" />
          </svg>
        </button>
        <div class="search-header__group">
          <button class="search-header__submit" type="submit">
            <svg role="img" class="search-header__submit-icon">
              <use href="images/icons/sprite.svg#search" />
            </svg>
          </button>
          <input type="text" class="search-header__control control" placeholder="Поиск" data-placeholder-pc="Поиск по ОГРН, ОГРНИП, ИНН, названию или ФИО" />
        </div>
        <div class="search-header__results search-results">
          <div class="search-results__triangle triangle"></div>
          <div class="search-results__items">
            <div class="search-results__item">
              <a href="#" class="item-search">
                <div class="item-search__title">ООО «МегаВояж-5» <span class="item-search__address">(г. Самара)</span></div>
                <div class="item-search__details">
                  <div class="item-search__detail detail-item-search">
                    <svg role="img" class="detail-item-search__icon">
                      <use href="images/icons/sprite.svg#crown" />
                    </svg>
                    <div class="detail-item-search__content">
                      <div class="detail-item-search__title">Генеральный директор:</div>
                      <div class="detail-item-search__text">Петров Степан Иванович</div>
                    </div>
                  </div>
                </div>
                <div class="item-search__infos">
                  <div class="item-search__info">ОГРН 1141650021523</div>
                  <div class="item-search__info">ИНН 1650297664</div>
                </div>
              </a>
            </div>
            <div class="search-results__item">
              <a href="#" class="item-search">
                <div class="item-search__title">ООО «МегаВояж-5» <span class="item-search__address">(г. Самара)</span></div>
                <div class="item-search__details">
                  <div class="item-search__detail detail-item-search">
                    <svg role="img" class="detail-item-search__icon">
                      <use href="images/icons/sprite.svg#crown" />
                    </svg>
                    <div class="detail-item-search__content">
                      <div class="detail-item-search__title">Генеральный директор:</div>
                      <div class="detail-item-search__text">Петров Степан Иванович</div>
                    </div>
                  </div>
                </div>
                <div class="item-search__infos">
                  <div class="item-search__info">ОГРН 1141650021523</div>
                  <div class="item-search__info">ИНН 1650297664</div>
                </div>
              </a>
            </div>
          </div>
          <a href="#" class="search-results__btn btn btn--light">показать все результаты</a>
        </div>
      </div>
    </form>
    <nav class="header__menu menu">
      <button class="menu__close close" type="button">
        <svg role="img" class="close__icon">
          <use href="images/icons/sprite.svg#close" />
        </svg>
      </button>
      <ul class="menu__list list-unstyled">
        <li class="is-active">
          <a href="#">
            <div class="menu__triangle triangle"></div>
            Организации
          </a>
        </li>
        <li>
          <a href="#">
            <div class="menu__triangle triangle"></div>
            ИП
          </a>
        </li>
        <li>
          <a href="#">
            <div class="menu__triangle triangle"></div>
            Статистика
          </a>
        </li>
        <li>
          <a href="#">
            <div class="menu__triangle triangle"></div>
            Источники данных
          </a>
        </li>
      </ul>
      <img src="images/menu-img.svg" alt="alt" class="menu__img" />
    </nav>
    <button class="header__hamburger" type="button">
      <img src="images/icons/burger.svg" alt="alt" class="header__hamburger-icon img-responsive" />
    </button>
  </div>
</header>
